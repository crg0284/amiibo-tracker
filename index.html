<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Amiibo Tracker"/>
  <meta name="theme-color" content="#c8002e"/>
  <title>Amiibo Collection Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100%; }
    body { background: #0d1117; overflow-x: hidden; }
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center;
               min-height:100vh; color:#fff; font-family:system-ui,sans-serif; gap:16px; }
    #loading p { font-size:14px; color:#aaa; }
    .spin { width:40px; height:40px; border:3px solid #2e3450;
            border-top-color:#E8003C; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading"><div class="spin"></div><p>Loading Amiibo Tracker…</p></div>
